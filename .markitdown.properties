# MarkItDown Java 配置文件
# 格式：每个配置项对应一个命令行参数，支持 # 注释

# ============================================
# 引擎路径配置
# ============================================

# Tesseract OCR 引擎路径
# 对应参数: --tesseract-path <路径>
# 环境变量: TESSERACT_PATH
# Windows示例: O:\\tesserOCR
# Linux/macOS示例: /usr/bin
tesseract.path=O:\\tesserOCR

# Tesseract 语言包目录路径
# 对应参数: --tessdata-path <路径>
# 环境变量: TESSDATA_PATH
# Windows示例: O:\\tesserOCR\\tessdata
# Linux/macOS示例: /usr/share/tesseract-ocr/4.00/tessdata
tessdata.path=O:\\tesserOCR\\tessdata

# ============================================
# 输出配置
# ============================================

# 默认输出目录
# 对应参数: -o <目录>
# 环境变量: MARKITDOWN_OUTPUT_DIR
# 说明: 所有转换结果的默认输出位置
# 默认值: ./output
output.dir=./output

# 图片资源目录名
# 对应参数: --image-output-dir <目录名>
# 环境变量: MARKITDOWN_IMAGE_DIR
# 说明: 提取的图片保存的子目录名称（相对于输出目录）
# 默认值: assets
output.image.dir=assets

# 临时文件目录
# 对应参数: --temp-dir <目录>
# 环境变量: MARKITDOWN_TEMP_DIR
# 说明: 处理过程中的临时文件存储位置
# 默认值: 系统临时目录
output.temp.dir=/tmp/markitdown

# 按文件类型组织输出
# 说明: 自动按文件类型创建子目录 (pdf/, docx/, xlsx/ 等)
# 默认值: false
output.organize.by.type=false

# 保持源目录结构
# 说明: 保持输入文件的目录层次结构
# 默认值: false
output.preserve.structure=false

# ============================================
# 内容包含控制
# ============================================

# 包含文档元数据
# 对应参数: --include-metadata / --no-metadata
# 说明: 是否在输出中包含文档的元数据信息
# 默认值: true
content.include.metadata=true

# 包含图片内容
# 对应参数: --include-images / --no-images
# 说明: 是否提取和包含文档中的图片
# 默认值: true
content.include.images=true

# 包含表格内容
# 对应参数: --include-tables / --no-tables
# 说明: 是否转换和包含文档中的表格
# 默认值: true
content.include.tables=true

# ============================================
# OCR 文字识别配置
# ============================================

# 启用 OCR 文字识别
# 对应参数: --ocr
# 说明: 自动对扫描文档和图片进行OCR识别
# 默认值: false
ocr.enable=false

# OCR 语言设置
# 对应参数: -l, --language <语言代码>
# 支持值: auto(自动检测), eng(英语), chi_sim(简体中文), chi_tra(繁体中文)
# 默认值: auto
ocr.language=auto

# ============================================
# 格式化选项
# ============================================

# 图片输出格式
# 对应参数: --image-format <格式>
# 支持值: markdown, html, base64
# 默认值: markdown
format.image=markdown

# 表格输出格式
# 对应参数: --table-format <格式>
# 支持值: github, markdown, pipe
# 默认值: github
format.table=github

# ============================================
# PDF 特定选项
# ============================================

# PDF 密码（用于加密PDF）
# 对应参数: --pdf-password <密码>
# 说明: 处理需要密码打开的加密PDF文件
# 默认值: (无)
pdf.password=

# ============================================
# 性能优化选项
# ============================================

# 启用并行处理
# 对应参数: -p, --parallel
# 说明: 使用多线程并行处理多个文件
# 默认值: false
performance.parallel=false

# 线程数量
# 对应参数: --threads <数量>
# 说明: 并行处理时使用的线程数量，0表示自动检测CPU核心数
# 默认值: 0 (自动检测)
performance.threads=0

# 启用内存优化
# 对应参数: --optimize-memory
# 说明: 处理大文件时启用内存优化策略
# 默认值: false
performance.optimize.memory=false

# 最大文件大小限制（字节）
# 对应参数: --max-file-size <字节数>
# 说明: 超过此大小的文件需要使用 --large-file 选项
# 默认值: 52428800 (50MB)
performance.max.file.size=52428800

# 批处理大小
# 说明: 一次处理的文件数量，用于内存管理
# 默认值: 20
performance.batch.size=20

# ============================================
# 用户界面选项
# ============================================

# 详细输出模式
# 对应参数: -v, --verbose
# 说明: 显示详细的处理信息和调试日志
# 默认值: false
ui.verbose=false

# 静默模式
# 对应参数: -q, --quiet
# 说明: 只显示错误信息，抑制正常输出
# 默认值: false
ui.quiet=false

# 显示进度条
# 对应参数: --progress
# 说明: 显示文件处理进度条
# 默认值: false
ui.progress=false

# 交互模式
# 对应参数: -i, --interactive
# 说明: 启用交互模式，显示友好的处理反馈
# 默认值: false
ui.interactive=false

# 显示性能统计
# 对应参数: --stats
# 说明: 处理完成后显示详细的性能统计信息
# 默认值: false
ui.stats=false

# ============================================
# 文件处理选项
# ============================================

# 递归处理子目录
# 对应参数: -r, --recursive
# 说明: 递归处理指定目录下的所有子目录
# 默认值: false
files.recursive=false

# 批量处理目录
# 对应参数: --batch
# 说明: 批量处理目录中所有支持的文件类型
# 默认值: false
files.batch=false

# 允许处理大文件
# 对应参数: --large-file
# 说明: 移除50MB的文件大小限制
# 默认值: false
files.large.file=false

# ============================================
# 排除文件模式
# ============================================

# 文件排除模式
# 说明: 匹配这些模式的文件将被跳过处理
# 支持通配符: *.tmp, *.bak, ~*
# 默认值: (空)
files.exclude.patterns=*.tmp
files.exclude.patterns+=*.bak
files.exclude.patterns+=~*

# ============================================
# 日志配置
# ============================================

# 日志级别
# 支持值: 0(ERROR), 1(WARN), 2(INFO), 3(DEBUG)
# 默认值: 1 (WARN)
logging.level=1